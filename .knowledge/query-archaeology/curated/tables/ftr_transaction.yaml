table_name: "FTR_TRANSACTION"
dataset: "snowflake-data"
full_path: "EDW_DB.CORE.FTR_TRANSACTION"
grain: "transaction_id"
schedule: "Daily"
description: >
  All settled transactions with derived metrics for Analytics.
  Upstream of critical pipelines for Risk, Finance, and DSML.
  Core transaction table — use for purchase volume, direct deposit analysis, ATM usage.

primary_key: ["transaction_id"]

key_columns:
  - name: "type"
    description: "Transaction type"
    values: ["Purchase", "Fee", "Deposit", "Withdrawal", "Transfer"]

  - name: "acct_in_out"
    description: "Money direction"
    values: ["In", "Out"]

  - name: "settled_amt"
    description: "Transaction amount (settled)"

  - name: "is_purchase_transaction"
    description: "Flag for purchase volume analysis"
    type: boolean

  - name: "is_qualified_dd"
    description: "Qualifying direct deposit flag ($200+ from approved sources)"
    type: boolean

  - name: "dd_proforma_type"
    description: "DD source type"
    values: ["payroll", "government_benefit", "gig_instant_payout", "unknown", "tax_refund", "social_security", "transfer", "child_support", "commission", "trial_deposit"]
    notes: >
      POINT-IN-TIME classification — reflects the mapping rules at the time the transaction
      was processed, NOT today's rules. This means historical transactions may have different
      classifications than they would receive under current rules. For example, in early 2025,
      TurboTax and other tax service deposits were classified as 'unknown' qualified DD;
      under current rules they are 'tax_refund' (non-qualified).
      CONSEQUENCE: YoY comparisons of dd_proforma_type will show artificial "unknown decline"
      that is actually a reclassification artifact, not real behavioral change.
      RECOMMENDATION: For consistent paytype analysis across time periods, use
      analytics_db.dbt_cloud_prod.new_eligible_dds_v2 instead (applies current rules retroactively).

  - name: "company_name"
    description: "Transaction originator name (e.g. employer, tax refund processor). FinPlat transactions only — NULL for Galileo transactions."
    notes: >
      Platform-specific: populated only for FinPlat transactions; NULL for all Galileo transactions.
      Always use COALESCE(company_name, TRANSACTION_DETAILS_2) to get the originator name
      across both platforms. Never filter solely on company_name — it will silently miss
      all Galileo transactions and produce misleading results.

  - name: "transaction_details_2"
    description: "Transaction originator name for Galileo transactions. Equivalent of company_name for the Galileo platform."
    notes: >
      Use COALESCE(company_name, TRANSACTION_DETAILS_2) as the unified originator name field.

  - name: "is_atm_withdrawal"
    description: "ATM withdrawal flag"
    type: boolean

  - name: "is_credit_builder_transaction"
    description: "Credit Builder (CB) transaction flag"
    type: boolean

  - name: "program_bank"
    description: "Banking partner that holds the member's deposit"
    values: ["Bancorp", "Stride"]

common_filters:
  - "is_purchase_transaction = TRUE  -- purchase transactions only"
  - "is_qualified_dd = TRUE          -- qualifying direct deposits ($200+)"
  - "is_atm_withdrawal = TRUE        -- ATM withdrawals"
  - "is_credit_builder_transaction = TRUE  -- Credit Builder transactions"
  - "acct_in_out = 'In'             -- inbound money (deposits, transfers in)"
  - "acct_in_out = 'Out'            -- outbound money (purchases, withdrawals)"

gotchas:
  - "Always filter to settled transactions — raw table may include pending/reversed entries"
  - "settled_amt can be negative for reversals/refunds — check direction with acct_in_out"
  - "is_qualified_dd = TRUE requires $200+ AND approved source — do not use settled_amt > 200 as a proxy"
  - "dd_proforma_type uses POINT-IN-TIME classification — NOT retroactively updated when mapping rules change. For consistent cross-period paytype analysis use analytics_db.dbt_cloud_prod.new_eligible_dds_v2 (consistent/retroactive rules)."
  - "Comparing dd_proforma_type YoY will show artificial 'unknown' declines if a reclassification event occurred (e.g. early 2025: tax refunds reclassified from unknown→tax_refund). Always confirm with new_eligible_dds before attributing unknown shifts to behavioral causes."
  - "program_bank (Bancorp vs Stride) can affect join behavior if joining to program-specific tables"

updated_at: "2026-03-24"
